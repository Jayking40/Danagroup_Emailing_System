
services:

  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dims_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./dims-frontend
      dockerfile: Dockerfile
    container_name: dims_frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://dims.danagroup.internal/api
      - NEXT_PUBLIC_WS_URL=wss://dims.danagroup.internal
      - NEXT_PUBLIC_APP_NAME=DIMS — Dana Internal Mail
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./dims-backend
      dockerfile: Dockerfile
    container_name: dims_api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dims_net

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dims_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dims_db}
      POSTGRES_USER: ${DB_USER:-dims_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dims_user} -d ${DB_NAME:-dims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dims_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

  # ─── MinIO Object Storage ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dims_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # MinIO Console (internal access only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - dims_net

  # ─── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: dims_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=dims-cluster
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - dims_net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
  nginx_logs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  dims_net:
    driver: bridge
