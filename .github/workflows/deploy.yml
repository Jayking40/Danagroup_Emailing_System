name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    environment: staging
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          NODE_ENV=staging
          APP_URL=${{ secrets.STAGING_APP_URL }}
          DB_HOST=${{ secrets.STAGING_DB_HOST }}
          DB_PORT=${{ secrets.STAGING_DB_PORT }}
          DB_NAME=${{ secrets.STAGING_DB_NAME }}
          DB_USER=${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          REDIS_HOST=${{ secrets.STAGING_REDIS_HOST }}
          REDIS_PORT=${{ secrets.STAGING_REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          MINIO_ENDPOINT=${{ secrets.STAGING_MINIO_ENDPOINT }}
          MINIO_PORT=${{ secrets.STAGING_MINIO_PORT }}
          MINIO_ACCESS_KEY=${{ secrets.STAGING_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.STAGING_MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.STAGING_MINIO_BUCKET }}
          ES_NODE=${{ secrets.STAGING_ES_NODE }}
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          JWT_ACCESS_EXPIRY=15m
          JWT_REFRESH_EXPIRY=7d
          FRONTEND_URL=${{ secrets.STAGING_FRONTEND_URL }}
          SESSION_SECRET=${{ secrets.STAGING_SESSION_SECRET }}
          EOF

      - name: Pull latest images and restart
        run: |
          docker compose pull
          docker compose build --no-cache
          docker compose up -d --remove-orphans

      - name: Run database migrations
        run: |
          docker compose exec -T api npm run migration:run

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost/api/health || exit 1

      - name: Notify on success
        if: success()
        run: echo "Staging deployment successful — ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "Staging deployment FAILED — ${{ github.sha }}"

  # ─── Deploy to Production (manual approval required) ─────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    environment: production  # Requires manual approval in GitHub Environments
    needs: []
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          NODE_ENV=production
          APP_URL=${{ secrets.PROD_APP_URL }}
          DB_HOST=${{ secrets.PROD_DB_HOST }}
          DB_PORT=${{ secrets.PROD_DB_PORT }}
          DB_NAME=${{ secrets.PROD_DB_NAME }}
          DB_USER=${{ secrets.PROD_DB_USER }}
          DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
          REDIS_HOST=${{ secrets.PROD_REDIS_HOST }}
          REDIS_PORT=${{ secrets.PROD_REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
          MINIO_ENDPOINT=${{ secrets.PROD_MINIO_ENDPOINT }}
          MINIO_PORT=${{ secrets.PROD_MINIO_PORT }}
          MINIO_ACCESS_KEY=${{ secrets.PROD_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.PROD_MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.PROD_MINIO_BUCKET }}
          ES_NODE=${{ secrets.PROD_ES_NODE }}
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          JWT_ACCESS_EXPIRY=15m
          JWT_REFRESH_EXPIRY=7d
          FRONTEND_URL=${{ secrets.PROD_FRONTEND_URL }}
          SESSION_SECRET=${{ secrets.PROD_SESSION_SECRET }}
          EOF

      - name: Backup database before deploy
        run: |
          DATE=$(date +%Y-%m-%d-%H%M%S)
          docker compose exec -T postgres pg_dump -U ${{ secrets.PROD_DB_USER }} ${{ secrets.PROD_DB_NAME }} | gzip > /backups/db/pre_deploy_${DATE}.sql.gz

      - name: Pull latest images and restart
        run: |
          docker compose pull
          docker compose build --no-cache
          docker compose up -d --remove-orphans

      - name: Run database migrations
        run: |
          docker compose exec -T api npm run migration:run

      - name: Health check
        run: |
          sleep 20
          curl -f http://localhost/api/health || exit 1

      - name: Tag release
        run: echo "Production deployment successful — ${{ github.ref_name }} (${{ github.sha }})"
